<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <title>CSLD&CPSRY | Multi-Platform Advertising Experts</title>
    <meta name="description" content="Empowering brands with high-performance dynamic multi-platform advertising and strategy execution." />

    <!--
      Baseline/fallback OG + Twitter tags. This SPA renders its per-page SEO
      client-side via react-helmet-async, which only updates the DOM after
      React mounts. Social-media/link-preview bots (Discord, Telegram,
      Facebook, X, Slack, iMessage, etc.) do not execute JavaScript, so they
      only ever see this static file. These tags exist so that if
      middleware.js (which serves bots a fully-rendered page per route) is
      ever removed or misses a route, there's still a correct generic preview
      instead of nothing.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://agency-website-pearl-nine.vercel.app/" />
    <meta property="og:title" content="CSLD&CPSRY | Multi-Platform Advertising Experts" />
    <meta property="og:description" content="Empowering brands with high-performance dynamic multi-platform advertising and strategy execution." />
    <meta property="og:image" content="https://agency-website-pearl-nine.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CSLD&CPSRY | Multi-Platform Advertising Experts" />
    <meta name="twitter:description" content="Empowering brands with high-performance dynamic multi-platform advertising and strategy execution." />
    <meta name="twitter:image" content="https://agency-website-pearl-nine.vercel.app/og-image.png" />

     <link rel="icon" type="image/png" href="/favicon.ico" />
  </head>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
